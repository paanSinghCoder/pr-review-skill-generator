<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4F46E5"/>
      <stop offset="0.55" stop-color="#7C3AED"/>
      <stop offset="1" stop-color="#A21CAF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.15" r="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  <rect width="256" height="256" rx="56" fill="url(#glow)"/>

  <!-- BONK! -->
  <text x="188" y="54" text-anchor="middle" font-family="Arial Black, Arial, Helvetica, sans-serif"
        font-size="34" font-weight="900" fill="#FFD93D" stroke="#7C2D12" stroke-width="1.5"
        transform="rotate(-8 188 54)">BONK!</text>

  <!-- swing motion lines -->
  <path d="M114 66 Q146 50 182 58" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.5" fill="none"/>
  <path d="M104 86 Q132 72 166 76" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.35" fill="none"/>

  <!-- bad PR getting bonked -->
  <g transform="rotate(8 202 158)">
    <rect x="180" y="132" width="44" height="54" rx="7" fill="#FFFFFF"/>
    <path d="M192 146 L212 166 M212 146 L192 166" stroke="#E5484D" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M188 176 L216 176" stroke="#C9CDD6" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- impact star -->
  <polygon points="231,118 217,113 223.4,99.6 210,106 205,92 200,106 186.6,99.6 193,113 179,118 193,123 186.6,136.4 200,130 205,144 210,130 223.4,136.4 217,123"
           fill="#FFD93D" stroke="#F59E0B" stroke-width="2" stroke-linejoin="round"/>

  <!-- bat, mid-bonk -->
  <g transform="rotate(20 155 100)">
    <rect x="148" y="91" width="72" height="19" rx="9.5" fill="#B5651D"/>
    <rect x="140" y="94" width="14" height="13" rx="6.5" fill="#8B4513"/>
  </g>

  <!-- shiba -->
  <!-- ears -->
  <polygon points="56,124 70,72 100,106" fill="#F2A65A"/>
  <polygon points="63,116 71,84 88,104" fill="#E88DA0"/>
  <polygon points="110,106 140,72 154,124" fill="#F2A65A"/>
  <polygon points="122,104 139,84 147,116" fill="#E88DA0"/>
  <!-- head -->
  <ellipse cx="105" cy="152" rx="54" ry="48" fill="#F2A65A"/>
  <!-- muzzle -->
  <ellipse cx="105" cy="172" rx="32" ry="23" fill="#FFF3E0"/>
  <!-- eyes: smug closed -->
  <path d="M74 140 Q82 132 90 140" stroke="#3B2716" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M118 140 Q126 132 134 140" stroke="#3B2716" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <!-- nose + mouth -->
  <circle cx="105" cy="163" r="5.5" fill="#3B2716"/>
  <path d="M96 176 Q105 184 114 176" stroke="#3B2716" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- blush -->
  <circle cx="66" cy="162" r="8" fill="#E88DA0" opacity="0.55"/>
  <circle cx="144" cy="162" r="8" fill="#E88DA0" opacity="0.55"/>
  <!-- paws gripping the bat -->
  <circle cx="158" cy="104" r="11" fill="#F2A65A" stroke="#D98A3D" stroke-width="2"/>
  <circle cx="171" cy="109" r="10" fill="#F2A65A" stroke="#D98A3D" stroke-width="2"/>
</svg>
